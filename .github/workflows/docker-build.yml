name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Productor
        run: |
          docker build \
          -t dominiquehernandezvallejos/despacho-guias-productor:latest \
          ./despacho-guias-productor

      - name: Push Productor
        run: |
          docker push dominiquehernandezvallejos/despacho-guias-productor:latest

      - name: Build Consumidor
        run: |
          docker build \
          -t dominiquehernandezvallejos/despacho-guias-consumidor:latest \
          ./despacho-guias-consumidor

      - name: Push Consumidor
        run: |
          docker push dominiquehernandezvallejos/despacho-guias-consumidor:latest